<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | CHEMCO</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--clr-blue);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .error-content {
            position: relative;
            z-index: 2;
        }
        .error-title {
            font-size: 8rem;
            font-weight: 800;
            color: var(--clr-orange);
            line-height: 1;
            margin-bottom: 20px;
            font-family: var(--font-heading);
        }
        .error-desc {
            font-size: 1.5rem;
            color: var(--clr-white);
            margin-bottom: 40px;
        }
        .floating-shape {
            position: absolute;
            opacity: 0.1;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="error-page">
        <!-- Floating shapes for background -->
        <i class="fa-solid fa-flask floating-shape" style="top: 10%; left: 10%; font-size: 5rem;"></i>
        <i class="fa-solid fa-vial floating-shape" style="top: 20%; right: 15%; font-size: 8rem;"></i>
        <i class="fa-solid fa-atom floating-shape" style="bottom: 15%; left: 20%; font-size: 10rem;"></i>
        <i class="fa-solid fa-microscope floating-shape" style="bottom: 10%; right: 10%; font-size: 6rem;"></i>

        <div class="container">
            <div class="error-content" data-aos="fade-up">
                <div class="error-title">404</div>
                <div class="error-desc">Oops! The page you are looking for has evaporated.</div>
                <div class="d-flex justify-content-center gap-3">
                    <button onclick="history.back()" class="btn-custom btn-outline-custom" style="color: white; border-color: white;">
                        <i class="fa-solid fa-arrow-left"></i> Go Back
                    </button>
                    <a href="index.html" class="btn-custom btn-primary-custom">
                        <i class="fa-solid fa-house"></i> Back To Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP for floating animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Floating animation for background shapes
            gsap.to(".floating-shape", {
                y: "random(-30, 30)",
                x: "random(-30, 30)",
                rotation: "random(-20, 20)",
                duration: 4,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut",
                stagger: 0.2
            });
        });
    </script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
