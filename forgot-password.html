<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CHEMCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(rgba(10,37,64,0.9), rgba(10,37,64,0.9)), url('https://placehold.co/1920x1080/0A2540/FFF.webp?text=Plant+Night') center/cover;
        }
        .auth-card {
            background: var(--clr-white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            margin: 40px auto;
        }
        .auth-header {
            background: var(--clr-blue);
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .auth-logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            color: var(--clr-white);
        }
        .auth-logo span { color: var(--clr-orange); }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--clr-white);
            font-size: 1.2rem;
            opacity: 0.8;
            transition: var(--transition-fast);
        }
        .back-btn:hover {
            color: var(--clr-orange);
            opacity: 1;
        }
        .auth-body {
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="back-btn" title="Back to Home"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="auth-logo"><img src="assets/logo.webp" alt="CHEMCO Logo" style="height: 40px; max-width: 160px; object-fit: contain; filter: drop-shadow(0 0 2px rgba(0,0,0,0.2));"></div>
                <p class="text-white mt-2 mb-0 opacity-75 small">Account Recovery</p>
            </div>
            <div class="auth-body">
                <h4 class="text-center mb-2 font-heading fw-bold">Reset Password</h4>
                <p class="text-center text-secondary small mb-4">Enter your registered email address and we'll send you instructions to reset your password.</p>
                <form class="auth-form" id="forgotForm">
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn-custom btn-primary-custom w-100 mb-3">Send Reset Link</button>
                    <div class="text-center">
                        <span class="text-secondary small">Remember your password? <a href="login.html" class="text-blue fw-bold">Login</a></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('auth-submit', function() {
            alert('Password reset link has been sent to your email.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
