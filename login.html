<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | CHEMCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-body);
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(10,37,64,0.6), rgba(10,37,64,0.6)), url('assets/bg-login.webp?v=1784695919390') center/cover;
            padding: 40px 20px;
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
            transition: opacity 0.3s;
            z-index: 10;
        }
        .back-btn:hover {
            opacity: 1;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card h2 {
            font-family: var(--font-heading);
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }
        .glass-card p.subtitle {
            text-align: center;
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .form-label {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border-radius: 8px;
            padding: 12px 15px;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.25) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
            box-shadow: none !important;
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            z-index: 10;
        }
        .toggle-password:hover {
            color: white;
        }
        .btn-submit {
            background-color: var(--clr-orange);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #e65c00;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
            display: flex;
            justify-content: space-between;
        }
        .auth-footer a {
            color: var(--clr-orange);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="glass-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to your CHEMCO account.</p>
            
            <form id="loginForm" class="auth-form">
                <div class="mb-3">
                    <label class="form-label">Select Role</label>
                    <select id="roleSelect" class="form-control glass-input" required>
                        <option value="admin" style="color: #333;">Admin</option>
                        <option value="manager" style="color: #333;">Manager</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="emailInput" class="form-control glass-input" placeholder="hello@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="password-container">
                        <input type="password" class="form-control glass-input pr-5" id="pwd" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="togglePwd('pwd', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            
            <div class="auth-footer mt-4">
                <a href="signup.html">Create an Account</a>
                <a href="404.html">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        function togglePwd(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const role = document.getElementById('roleSelect').value;
            const email = document.getElementById('emailInput').value;
            localStorage.setItem('chemcoUserEmail', email);
            
            if (role === 'admin') {
                window.location.href = 'dashboard-admin.html';
            } else if (role === 'manager') {
                window.location.href = 'dashboard-manager.html';
            }
        });
    </script>
</body>
</html>
